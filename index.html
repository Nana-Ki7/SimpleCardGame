<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimpleCardGame - 大厅</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 连接状态 -->
        <div id="status-bar">
            <span id="status-dot" class="dot-offline"></span>
            <span id="status-text">未连接</span>
        </div>

        <!-- 昵称设置 -->
        <div id="login-section" class="section">
            <h1>SimpleCardGame</h1>
            <div class="input-group">
                <label>昵称</label>
                <input type="text" id="nick-input" maxlength="10" placeholder="输入昵称">
                <button id="save-nick-btn">保存</button>
            </div>
        </div>

        <!-- 房间列表 -->
        <div id="lobby-section" class="section hidden">
            <div class="section-header">
                <h2>房间列表</h2>
                <button id="create-room-btn" class="btn-primary">+ 创建房间</button>
            </div>
            <div id="room-list">
                <div class="empty-msg">暂无房间，点击上方创建</div>
            </div>
        </div>
    </div>

    <script src="ws.js"></script>
    <script src="lobby.js"></script>
</body>
</html>
